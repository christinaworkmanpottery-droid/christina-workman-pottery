services:
  - type: web
    name: christina-workman-pottery
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./public
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
